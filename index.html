            RotateCcw: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`,
            Brain: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M12 5v14"/></svg>`,
            Zap: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
            Sparkles: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275Z"/><path d="m5 3 1 2.5L8.5 6 6 7 5 9.5 4 7 1.5 6 4 5.5Z"/><path d="m19 17 1 2.5 2.5.5-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1Z"/></svg>`,
            Volume2: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`,
            VolumeX: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>`,
            ChevronRight: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
            Wind: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.8 18a2.5 2.5 0 1 0-2.5-2.5"/><path d="M5.75 12H18a2.5 2.5 0 1 0-2.5-2.5"/><path d="M6.25 6H12a2.5 2.5 0 1 1-2.5 2.5"/></svg>`,
            Clock: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
            Flame: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>`,
            History: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>`,
            SkipForward: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>`,
            Square: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>`
        };
        
        // This bridges the original components like <Play size={20}/> to work without imports
        function LucideIconBridge({ name, size = 16, color = "currentColor", style = {}, className = "" }) {
            const html = window.Icons[name] ? window.Icons[name]() : '';
            return React.createElement("span", {
                className: className,
                style: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: size, height: size, color: color, ...style },
                dangerouslySetInnerHTML: { __html: html.replace(/width="24"/g, `width="${size}"`).replace(/height="24"/g, `height="${size}"`) }
            });
        }
        
        // Direct object proxies for the icons used in your code
        const Play = (props) => React.createElement(LucideIconBridge, { name: "Play", ...props });
        const Pause = (props) => React.createElement(LucideIconBridge, { name: "Pause", ...props });
        const RotateCcw = (props) => React.createElement(LucideIconBridge, { name: "RotateCcw", ...props });
        const Brain = (props) => React.createElement(LucideIconBridge, { name: "Brain", ...props });
        const Zap = (props) => React.createElement(LucideIconBridge, { name: "Zap", ...props });
        const Sparkles = (props) => React.createElement(LucideIconBridge, { name: "Sparkles", ...props });
        const Volume2 = (props) => React.createElement(LucideIconBridge, { name: "Volume2", ...props });
        const VolumeX = (props) => React.createElement(LucideIconBridge, { name: "VolumeX", ...props });
        const ChevronRight = (props) => React.createElement(LucideIconBridge, { name: "ChevronRight", ...props });
        const Wind = (props) => React.createElement(LucideIconBridge, { name: "Wind", ...props });
        const Clock = (props) => React.createElement(LucideIconBridge, { name: "Clock", ...props });
        const Flame = (props) => React.createElement(LucideIconBridge, { name: "Flame", ...props });
        const History = (props) => React.createElement(LucideIconBridge, { name: "History", ...props });
        const SkipForward = (props) => React.createElement(LucideIconBridge, { name: "SkipForward", ...props });
        const Square = (props) => React.createElement(LucideIconBridge, { name: "Square", ...props });
    </script>

</head>
<body class="bg-[#03020c]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        /* ============================================================================\n   CONSTANTS\n   ============================================================================ */
        const ACCENT  = "#22d3ee";
        const ACCENT2 = "#818cf8";
        const GRAD    = "linear-gradient(135deg, #22d3ee 0%, #818cf8 100%)";
        const TOTAL   = 30 * 60; // 1800s

        const STAGES = [
          { id:"box",     name:"The Box",    duration:8*60, color:"#818cf8", glow:"rgba(129,140,248,0.45)", icon:"◻", label:"Clear the field",      instruction:"Visualize a heavy, sealed box. Place every thought, every worry from today inside it. Lock it shut." },
          { id:"saber",   name:"The Saber",  duration:8*60, color:"#22d3ee", glow:"rgba(34,211,238,0.45)",  icon:"⟁", label:"Build your energy",     instruction:"A point of light expands into a glowing saber. Feel it rotate around your body, shifting electric blue to radiant green." },
          { id:"pattern", name:"Patterning", duration:8*60, color:"#fbbf24", glow:"rgba(251,191,36,0.45)",  icon:"◎", label:"Project your intent",   instruction:"See yourself right now achieving exactly what you want. Flood the scene with full emotion. Then release it completely." },
          { id:"float",   name:"Free Float", duration:6*60, color:"#a78bfa", glow:"rgba(167,139,250,0.45)", icon:"∿", label:"Surrender to the field", instruction:"Release all control. Drift inside the 4Hz. Let the synchronization do its work." },
        ];

        const BREATH_CYCLE = 16;
        const BREATH_PHASES = [
          { name:"Inhale",  start:0,  end:4,  color:ACCENT,   targetScale:1.55 },
          { name:"Hold",    start:4,  end:8,  color:"#fbbf24", targetScale:1.55 },
          { name:"Exhale",  start:8,  end:14, color:ACCENT2,   targetScale:1.0  },
          { name:"Hold",    start:14, end:16, color:"#475569", targetScale:1.0  },
        ];
        const BREATH_DURATION = 2 * 60; 

        function getBreathPhase(sec) {
          const t = sec % BREATH_CYCLE;
          const phase = BREATH_PHASES.find(p => t >= p.start && t < p.end) || BREATH_PHASES[0];
          const localT = (t - phase.start) / (phase.end - phase.start);
          const prev = BREATH_PHASES[(BREATH_PHASES.indexOf(phase) - 1 + 4) % 4];
          const scale = prev.targetScale + (phase.targetScale - prev.targetScale) * easeInOut(localT);
          return { phase, scale, localT };
        }

        function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

        function getStageIndex(e) {
          let acc = 0;
          for (let i = 0; i < STAGES.length; i++) { acc += STAGES[i].duration; if (e < acc) return i; }
          return STAGES.length - 1;
        }

        function getStageElapsed(e) {
          let acc = 0;
          for (let i = 0; i < STAGES.length; i++) {
            if (e < acc + STAGES[i].duration) return e - acc;
            acc += STAGES[i].duration;
          }
          return STAGES[STAGES.length-1].duration;
        }

        const fmt = (s) => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(Math.floor(s%60)).padStart(2,"0")}`;
        const toRGBA = (hex, a) => { const h=hex.replace("#",""); return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`; };

        /* ============================================================================\n   CANVAS RENDER ENGINE\n   ============================================================================ */
        function drawBg(ctx, t, W, H) {
          ctx.fillStyle = "#03020c"; ctx.fillRect(0,0,W,H);
          for (let i=0; i<90; i++) {
            const s=i*997.31, x=((Math.sin(s*0.1)*0.5+0.5))*W, y=((Math.sin(s*0.23)*0.5+0.5))*H;
            const tw=0.1+0.2*Math.sin(t*1.3+s), sz=0.4+0.5*((i%3)/3);
            ctx.beginPath(); ctx.arc(x,y,sz,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${tw})`; ctx.fill();
          }
        }
        function drawBox(ctx, t, W, H) {
          const cx=W/2, cy=H/2, S=Math.min(W,H)*0.2, ay=t*0.38, ax=0.32;
          const proj=(x,y,z)=>{ let rx=x*Math.cos(ay)+z*Math.sin(ay), rz=-x*Math.sin(ay)+z*Math.cos(ay), ry=y*Math.cos(ax)-rz*Math.sin(ax); return [cx+rx*S, cy+ry*S]; };
          const v=[proj(-1,-1,-1),proj(1,-1,-1),proj(1,1,-1),proj(-1,1,-1),proj(-1,-1,1),proj(1,-1,1),proj(1,1,1),proj(-1,1,1)];
          const edges=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
          const pulse=0.55+0.45*Math.sin(t*4*Math.PI*2);
          ctx.save(); ctx.shadowColor="#818cf8"; ctx.shadowBlur=18*pulse;
          ctx.strokeStyle=`rgba(129,140,248,${0.55+0.35*pulse})`; ctx.lineWidth=1.5;
          edges.forEach(([a,b])=>{ ctx.beginPath(); ctx.moveTo(v[a][0],v[a][1]); ctx.lineTo(v[b][0],v[b][1]); ctx.stroke(); });
          ctx.restore();
        }
        function drawSaber(ctx, t, W, H) {
          const cx=W/2, cy=H/2, orbitR=Math.min(W,H)*0.08, ang=t*0.7, sx=cx+orbitR*Math.sin(ang), sy=cy-orbitR*Math.cos(ang)*0.4, sH=Math.min(W,H)*0.28;
          const cp=(Math.sin(t*0.4)+1)/2, cr=Math.round(34*(1-cp)+10*cp), cg=Math.round(211*(1-cp)+180*cp), cb=Math.round(238*(1-cp)+80*cp), sc=`rgb(${cr},${cg},${cb})`;
          for(let i=0; i<4; i++){ const ph=((t*4+i*0.25)%1), rr=ph*Math.min(W,H)*0.38; ctx.beginPath(); ctx.arc(cx,cy,rr,0,Math.PI*2); ctx.strokeStyle=`rgba(${cr},${cg},${cb},${(1-ph)*0.22})`; ctx.lineWidth=1.2; ctx.stroke(); }
          ctx.save(); ctx.shadowColor=sc; ctx.shadowBlur=22; ctx.beginPath(); ctx.ellipse(sx,sy,2.5,sH/2,0,0,Math.PI*2); ctx.fillStyle="rgba(255,255,255,0.92)"; ctx.fill(); ctx.restore();
        }
        function drawPatterning(ctx, t, W, H) {
          const cx=W/2, cy=H/2, maxR=Math.min(W,H)*0.42;
          for(let i=0; i<5; i++){ const ph=((t*0.45+i*0.2)%1), rr=ph*maxR; ctx.beginPath(); ctx.arc(cx,cy,rr,0,Math.PI*2); ctx.strokeStyle=`rgba(251,191,36,${(1-ph)*0.45})`; ctx.lineWidth=1.8; ctx.stroke(); }
          const cp=0.55+0.45*Math.sin(t*4*Math.PI*2); ctx.save(); ctx.shadowColor="#fbbf24"; ctx.shadowBlur=28*cp; ctx.beginPath(); ctx.arc(cx,cy,7*cp,0,Math.PI*2); ctx.fillStyle=`rgba(251,191,36,${0.85*cp})`; ctx.fill(); ctx.restore();
        }
        function drawFloat(ctx, t, W, H) {
          for(let i=0; i<60; i++){ const s=i*137.5, bx=(Math.sin(s*0.1+0.3)*0.5+0.5), by=(Math.sin(s*0.23+0.7)*0.5+0.5), x=bx*W, y=by*H, tw=0.1+0.3*Math.sin(t*0.6+s*0.5); ctx.beginPath(); ctx.arc(x,y,1,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${tw})`; ctx.fill(); }
        }

        /* ============================================================================\n   COMPONENTS\n   ============================================================================ */
        function GlassButton({ children, onClick, color=ACCENT, variant="ghost", disabled, style, className="" }) {
          const bg = variant === "primary" ? `linear-gradient(135deg, ${toRGBA(color,0.22)} 0%, ${toRGBA(color,0.08)} 100%)` : "linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 100%)";
          return (
            <button onClick={onClick} disabled={disabled} className={`liquid-rim transition-all ${className}`}
              style={{ padding:"11px 22px", fontSize:13, fontWeight:600, background:bg, border:`1px solid ${variant==="primary"?toRGBA(color,0.4):"rgba(255,255,255,0.12)"}`, color:variant==="primary"?color:"#e2e8f0", borderRadius:16, cursor:disabled?"not-allowed":"pointer", opacity:disabled?0.4:1, display:"inline-flex", alignItems:"center", justifyOrigin:"center", gap:8, backdropFilter:"blur(20px)", boxShadow:"0 4px 16px rgba(0,0,0,0.25)", whiteSpace:"nowrap", ...style }}>
              {children}
            </button>
          );
        }

        /* ============================================================================\n   MAIN APPLICATION VIEW\n   ============================================================================ */
        function GatewayApp() {
          const [phase, setPhase] = useState("idle"); 
          const [elapsed, setElapsed] = useState(0);
          const [breathSec, setBreathSec] = useState(0);
          const [volume, setVolume] = useState(0.2);
          const [muted, setMuted] = useState(false);
          const [quality, setQuality] = useState(0);
          const [note, setNote] = useState("");

          const canvasRef = useRef(null);
          const audioRef = useRef(null);
          const timerRef = useRef(null);
          const breathRef = useRef(null);
          const startRef = useRef(null);

          useEffect(() => {
            const canvas = canvasRef.current; if (!canvas) return;
            let id;
            const loop = (ts) => {
              const t = ts/1000, W = canvas.width, H = canvas.height, ctx = canvas.getContext("2d");
              drawBg(ctx, t, W, H);
              if (phase === "active" || phase === "paused" || phase === "done") {
                const si = getStageIndex(elapsed);
                if (si === 0) drawBox(ctx, t, W, H);
                else if (si === 1) drawSaber(ctx, t, W, H);
                else if (si === 2) drawPatterning(ctx, t, W, H);
                else drawFloat(ctx, t, W, H);
              } else { drawSaber(ctx, t*0.4, W, H); }
              id = requestAnimationFrame(loop);
            };
            id = requestAnimationFrame(loop);
            return () => cancelAnimationFrame(id);
          }, [phase, elapsed]);

          const createAudio = useCallback((vol) => {
            try {
              const ctx = new(window.AudioContext || window.webkitAudioContext)();
              const gain = ctx.createGain(); gain.gain.value = 0;
              const oscL = ctx.createOscillator(), oscR = ctx.createOscillator();
              oscL.type = "sine"; oscL.frequency.value = 170;
              oscR.type = "sine"; oscR.frequency.value = 174;
              const pL = ctx.createStereoPanner(), pR = ctx.createStereoPanner();
              pL.pan.value = -1; pR.pan.value = 1;
              
              oscL.connect(pL); pL.connect(gain);
              oscR.connect(pR); pR.connect(gain);
              gain.connect(ctx.destination);
              
              oscL.start(); oscR.start();
              gain.gain.setValueAtTime(0, ctx.currentTime);
              gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + 2.5);
              
              audioRef.current = {
                ctx, gain,
                pause: () => { gain.gain.setValueAtTime(gain.gain.value, ctx.currentTime); gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5); },
                resume: (v) => { ctx.resume(); gain.gain.setValueAtTime(gain.gain.value, ctx.currentTime); gain.gain.linearRampToValueAtTime(v || 0.2, ctx.currentTime + 1); },
                setVol: (v) => { gain.gain.setValueAtTime(gain.gain.value, ctx.currentTime); gain.gain.linearRampToValueAtTime(v, ctx.currentTime + 0.3); },
                stop: () => { gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1); setTimeout(() => { try { oscL.stop(); oscR.stop(); ctx.close(); } catch(e){} }, 1200); }
              };
            } catch(e){}
          }, []);

          const startBreathwork = () => {
            setBreathSec(0); setPhase("breath");
            breathRef.current = setInterval(() => {
              setBreathSec(s => {
                if (s >= BREATH_DURATION - 1) { clearInterval(breathRef.current); launchSession(); return 0; }
                return s + 1;
              });
            }, 1000);
          };

          const launchSession = () => {
            createAudio(volume); setPhase("active");
            startRef.current = Date.now() - elapsed * 1000;
            timerRef.current = setInterval(() => {
              const e = Math.floor((Date.now() - startRef.current) / 1000);
              setElapsed(e);
              if (e >= TOTAL) { clearInterval(timerRef.current); audioRef.current?.stop(); setPhase("done"); }
            }, 400);
          };

          const togglePlay = () => {
            if (phase === "active") { clearInterval(timerRef.current); audioRef.current?.pause(); setPhase("paused"); }
            else if (phase === "paused") { startRef.current = Date.now() - elapsed * 1000; audioRef.current?.resume(muted ? 0 : volume); setPhase("active"); timerRef.current = setInterval(() => { setElapsed(Math.floor((Date.now() - startRef.current) / 1000)); }, 400); }
          };

          const toggleMute = () => { const nm = !muted; setMuted(nm); audioRef.current?.setVol(nm ? 0 : volume); };
          const handleVolChange = (v) => { setVolume(v); if (!muted) audioRef.current?.setVol(v); };
          const resetSession = () => { clearInterval(timerRef.current); clearInterval(breathRef.current); audioRef.current?.stop(); audioRef.current = null; setPhase("idle"); setElapsed(0); setBreathSec(0); };
          const saveSession = () => { resetSession(); };

          const stageIdx = getStageIndex(elapsed);
          const stage = STAGES[stageIdx];
          const timeLeft = Math.max(0, TOTAL - elapsed);
          const totalPct = elapsed / TOTAL;
          const stageElapsed = getStageElapsed(elapsed);
          const stagePct = stageElapsed / stage.duration;
          const { phase: bp, scale: breathScale } = getBreathPhase(breathSec);

          return (
            <div className="min-h-screen w-full flex flex-col items-center justify-start relative px-4 py-8 select-none">
              <div style={{ position:"fixed", inset:0, pointerEvents:"none", background:`radial-gradient(ellipse 60% 45% at 50% -5%, rgba(34,211,238,0.08) 0%, transparent 55%)` }}/>
              <canvas ref={canvasRef} width={600} height={600} style={{ position:"fixed", top:"50%", left:"50%", transform:"translate(-50%,-50%)", width:"min(600px,100vw)", height:"min(600px,100vw)", opacity:phase==="active"?0.9:0.4, pointerEvents:"none" }}/>

              {phase === "idle" && (
                <div style={{ position:"relative", zIndex:1, width:"100%", maxWidth:520, animation:"fadeUp 0.6s ease" }} className="flex flex-col items-center mt-6">
                  <div style={{ width:54, height:54, borderRadius:15, background:GRAD }} className="flex items-center justify-center shadow-lg mb-4">
                    <Brain size={25} color="#fff"/>
                  </div>
                  <h1 style={{ background:GRAD, WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }} className="text-4xl font-extrabold tracking-tight mb-1">GATEWAY</h1>
                  <p className="text-xs text-slate-500 font-medium tracking-widest uppercase mb-8">Hemispheric Synchronization · 30 min</p>

                  <div className="w-full flex flex-col gap-2 mb-6">
                    {STAGES.map((s) => (
                      <div key={s.id} className="liquid-rim flex items-center gap-4 p-4 bg-white/[0.03] border border-white/[0.07] rounded-xl backdrop-blur-md">
                        <div style={{ background:toRGBA(s.color,0.14), border:`1px solid ${toRGBA(s.color,0.28)}`, color:s.color }} className="w-9 h-9 rounded-lg flex items-center justify-center font-bold text-lg">{s.icon}</div>
                        <div className="flex-1">
                          <p className="text-sm font-bold text-slate-100">{s.name}</p>
                          <p className="text-xs text-slate-500">{s.label}</p>
                        </div>
                        <span className="text-xs text-slate-600 font-medium">{s.duration/60} min</span>
                      </div>
                    ))}
                  </div>

                  <div className="liquid-rim w-full p-4 bg-white/[0.04] border border-white/[0.07] rounded-xl backdrop-blur-md mb-8">
                    <div className="flex justify-between items-center mb-2">
                      <span className="text-xs text-slate-400 flex items-center gap-1"><Volume2 size={13}/> Volume</span>
                      <span className="text-xs font-semibold text-cyan-400">20% Recommended</span>
                    </div>
                    <div className="relative h-1 bg-white/10 rounded-full">
                      <div style={{ width:`${(volume/0.4)*100}%`, background:GRAD }} className="h-full rounded-full"/>
                      <input type="range" min={2} max={40} value={Math.round(volume*100)} onChange={e=>handleVolChange(Number(e.target.value)/100)} className="absolute inset-0 opacity-0 w-full cursor-pointer"/>
                    </div>
                  </div>

                  <div className="flex flex-col items-center gap-4 w-full">
                    <GlassButton variant="primary" color={ACCENT} onClick={startBreathwork} style={{ borderRadius:999, padding:"14px 40px" }} className="w-full sm:w-auto">
                      <Wind size={17}/> Breathwork + Session
                    </GlassButton>
                    <GlassButton onClick={()=>{ setElapsed(0); launchSession(); }} style={{ borderRadius:999 }}>
                      <SkipForward size={13}/> Skip breathwork
                    </GlassButton>
                  </div>
                </div>
              )}

              {phase === "breath" && (
                <div style={{ position:"relative", zIndex:1, maxWidth:420 }} className="w-full flex flex-col items-center gap-8 text-center mt-12 animate-[fadeUp_0.5s_ease]">
                  <div>
                    <h2 className="text-2xl font-extrabold mb-1">Box Breathing</h2>
                    <p className="text-xs text-slate-500 px-4">Activate the vagus nerve · lower cortisol · prepare for Focus 10</p>
                  </div>
                  <div style={{ position:"relative", width:200, height:200 }} className="flex items-center justify-center">
                    <div style={{ position:"absolute", inset:0, borderRadius:"50%", background:`radial-gradient(circle, ${toRGBA(bp.color,0.06)} 0%, transparent 70%)`, transform:`scale(${breathScale*1.3})` }}/>
                    <div style={{ position:"absolute", inset:0, borderRadius:"50%", border:`2px solid ${toRGBA(bp.color,0.4)}`, transform:`scale(${breathScale})`, boxShadow:`0 0 20px ${toRGBA(bp.color,0.3)}` }}/>
                    <div style={{ width:80, height:80, borderRadius:"50%", background:`radial-gradient(circle, ${toRGBA(bp.color,0.25)}, transparent)`, border:`1px solid ${toRGBA(bp.color,0.4)}`, color:bp.color }} className="flex items-center justify-center font-bold text-sm">{bp.name}</div>
                  </div>
                  <div>
                    <p className="text-4xl font-black text-slate-100">{fmt(BREATH_DURATION-breathSec)}</p>
                    <p className="text-[10px] text-slate-500 tracking-widest font-bold">REMAINING</p>
                  </div>
                  <GlassButton onClick={()=>{ clearInterval(breathRef.current); launchSession(); }} style={{ borderRadius:999 }}>
                    <SkipForward size={13}/> Skip to session
                  </GlassButton>
                </div>
              )}

              {(phase === "active" || phase === "paused") && (
                <div style={{ position:"relative", zIndex:1, width:"100%", maxWidth:520 }} className="flex flex-col items-center justify-between flex-1 mt-2">
                  <div className="w-full flex justify-between items-center">
                    <span className="text-xs text-slate-500 font-bold tracking-wider flex items-center gap-2">
                      <div className="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"/> LIVE · 170Hz / 174Hz
                    </span>
                    <GlassButton variant="primary" color="#f87171" onClick={resetSession} style={{ padding:"6px 12px", borderRadius:12 }}>
                      <RotateCcw size={12}/> Reset
                    </GlassButton>
                  </div>

                  <div className="flex flex-col items-center justify-center flex-1 w-full gap-8 py-12">
                    <div style={{ position:"relative", width:240, height:240 }} className="flex flex-col items-center justify-center bg-white/[0.02] backdrop-blur-sm border border-white/10 rounded-full shadow-2xl">
                      <div style={{ position:"absolute", inset:0, borderRadius:"50%", border:"1px dashed rgba(255,255,255,0.05)", animation:"hz4 16s infinite ease-in-out" }}/>
                      <span className="text-5xl font-black tracking-tighter" style={{ textShadow:`0 0 20px ${stage.color}` }}>{fmt(timeLeft)}</span>
                      <span className="text-[10px] font-bold tracking-widest uppercase mt-1" style={{ color:stage.color }}>{stage.name}</span>
                    </div>

                    <div className="w-full max-w-sm flex flex-col gap-2">
                      <div className="flex justify-between items-center text-[10px] text-slate-500 font-bold px-1">
                        <span style={{ color:stage.color }}>STAGE PROGRESS</span>
                        <span>{Math.floor(stagePct*100)}%</span>
                      </div>
                      <div className="h-1 bg-white/5 rounded-full overflow-hidden">
                        <div style={{ width:`${stagePct*100}%`, background:stage.color }} className="h-full rounded-full transition-all duration-300"/>
                      </div>
                    </div>

                    <div className="liquid-rim w-full max-w-sm p-4 bg-white/[0.03] border rounded-2xl text-center backdrop-blur-md" style={{ borderColor:toRGBA(stage.color,0.2) }}>
                      <p className="text-xs text-slate-400 leading-relaxed">{stage.instruction}</p>
                    </div>
                  </div>

                  <div className="w-full flex flex-col items-center gap-5">
                    <div className="w-full flex justify-between items-center px-1">
                      <div className="flex items-center gap-1.5 cursor-pointer" onClick={toggleMute}>
                        {muted ? <VolumeX size={15} color="#64748b"/> : <Volume2 size={15} color="#22d3ee"/>}
                        <span className="text-xs font-semibold" style={{ color:muted?"#64748b":"#22d3ee" }}>{muted ? "Muted" : `${Math.round(volume*100)}%`}</span>
                      </div>
                      <div className="text-[10px] text-slate-500 font-bold tracking-wider">TOTAL PROGRESS · {Math.floor(totalPct*100)}%</div>
                    </div>

                    <div className="w-full h-1 bg-white/10 rounded-full overflow-hidden mb-2">
                      <div style={{ width:`${totalPct*100}%`, background:GRAD }} className="h-full rounded-full"/>
                    </div>

                    <div className="w-full flex items-center gap-3">
                      <GlassButton onClick={togglePlay} style={{ flex:1, justifyContent:"center", borderRadius:12 }}>
                        {phase === "active" ? <Pause size={14}/> : <Play size={14}/>} {phase === "active" ? "Pause" : "Resume"}
                      </GlassButton>
                      <GlassButton variant="primary" color={ACCENT} onClick={() => setPhase("done")} style={{ flex:2, justifyContent:"center", borderRadius:12 }}>
                        <Zap size={14}/> Save & Finish
                      </GlassButton>
                    </div>
                  </div>
                </div>
              )}

              {phase === "done" && (
                <div style={{ position:"relative", zIndex:1, maxWidth:400, animation:"fadeUp 0.5s ease" }} className="w-full bg-white/[0.02] border border-white/10 p-6 rounded-2xl text-center backdrop-blur-md mt-16 shadow-xl">
                  <div style={{ background:"rgba(52,211,153,0.15)", border:"1px solid rgba(52,211,153,0.3)" }} className="w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-4">
                    <Sparkles size={20} color="#34d399"/>
                  </div>
                  <h2 className="text-xl font-bold text-slate-100 mb-2">סנכרון הושלם!</h2>
                  <p className="text-xs text-slate-400 leading-relaxed mb-6">הסשן נשמר בהצלחה. שתי המיספרות המוח פועלות כעת בסינכרון מלא ותדר ה-4Hz הוטמע בהצלחה.</p>

                  <div className="flex flex-col gap-3 text-right mb-6" dir="rtl">
                    <label className="text-[10px] text-slate-500 font-bold tracking-wider">איכות הסנכרון (1-5)</label>
                    <div className="flex gap-2 justify-start">
                      {[1,2,3,4,5].map((num) => (
                        <button key={num} onClick={() => setQuality(num)} style={{ background:quality>=num?GRAD:"rgba(255,255,255,0.03)", border:quality>=num?"1px solid transparent":"1px solid rgba(255,255,255,0.1)" }} className="w-9 h-9 rounded-lg font-bold text-sm transition-all">{num}</button>
                      ))}
                    </div>
                  </div>

                  <div className="flex flex-col gap-2 text-right mb-6" dir="rtl">
                    <label className="text-[10px] text-slate-500 font-bold tracking-wider">תובנות מהמדיטציה (Focus 10)</label>
                    <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="כתוב כאן חוויות, דפוסי חשיבה ששחררת או רשמים..." style={{ background:"rgba(0,0,0,0.2)", border:"1px solid rgba(255,255,255,0.08)" }} className="w-full h-20 rounded-xl p-3 text-xs text-slate-200 placeholder-slate-600 focus:outline-none focus:border-cyan-500 transition-all"/>
                  </div>

                  <div className="flex gap-3">
                    <GlassButton onClick={resetSession} style={{ flex:1, justifyOrigin:"center", borderRadius:12 }}>Skip</GlassButton>
                    <GlassButton variant="primary" color={ACCENT} onClick={saveSession} style={{ flex:2, justifyContent:"center", borderRadius:12 }}>
                      <Zap size={14}/> Save & Finish
                    </GlassButton>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // Render straight to root
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(GatewayApp));
    </script>

    <style>
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
        @keyframes hz4{0%,100%{opacity:0.15;transform:scale(1.0);}50%{opacity:0.55;transform:scale(1.04);}}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{margin:0; font-family: 'Sora', sans-serif;}
        ::-webkit-scrollbar{width:4px;}
        ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px;}
        .liquid-rim{position:relative;}
        .liquid-rim::before{content:"";position:absolute;inset:0;padding:1.2px;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,0.48) 0%,rgba(255,255,255,0.13) 22%,transparent 45%,transparent 55%,rgba(255,255,255,0.13) 78%,rgba(255,255,255,0.42) 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
    </style>
</body>
</html>
