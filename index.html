<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway Experience App</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script>
        window.Icons = {
            Brain: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M12 5v14"/></svg>`,
            Play: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>`,
            Pause: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="14" y="4" width="4" height="16" rx="1"/><rect x="6" y="4" width="4" height="16" rx="1"/></svg>`,
            RotateCcw: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`,
            Zap: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
            Sparkles: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275Z"/><path d="m5 3 1 2.5L8.5 6 6 7 5 9.5 4 7 1.5 6 4 5.5Z"/><path d="m19 17 1 2.5 2.5.5-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1Z"/></svg>`,
            Volume2: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`,
            VolumeX: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>`,
            Wind: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.8 18a2.5 2.5 0 1 0-2.5-2.5"/><path d="M5.75 12H18a2.5 2.5 0 1 0-2.5-2.5"/><path d="M6.25 6H12a2.5 2.5 0 1 1-2.5 2.5"/></svg>`,
            Flame: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>`,
            History: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>`,
            SkipForward: () => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>`
        };
        window.IconRenderer = ({ name, size = 16, color = "currentColor", style = {} }) => {
            const html = window.Icons[name] ? window.Icons[name]() : '';
            return React.createElement("span", {
                style: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: size, height: size, color: color, ...style },
                dangerouslySetInnerHTML: { __html: html.replace(/width="24"/g, `width="${size}"`).replace(/height="24"/g, `height="${size}"`) }
            });
        };
    </script>
</head>
<body style="margin: 0; background-color: #03020c; min-height: 100vh;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        const ACCENT  = "#22d3ee";
        const ACCENT2 = "#818cf8";
        const GRAD    = "linear-gradient(135deg, #22d3ee 0%, #818cf8 100%)";
        const TOTAL   = 30 * 60; 

        const STAGES = [
          { id:"box",     name:"The Box",    duration:8*60, color:"#818cf8", icon:"◻", label:"Clear the field",      instruction:"Visualize a heavy, sealed box. Place every thought, every worry from today inside it. Lock it shut." },
          { id:"saber",   name:"The Saber",  duration:8*60, color:"#22d3ee", icon:"⟁", label:"Build your energy",     instruction:"A point of light expands into a glowing saber. Feel it rotate around your body, shifting electric blue to radiant green." },
          { id:"pattern", name:"Patterning", duration:8*60, color:"#fbbf24", icon:"◎", label:"Project your intent",   instruction:"See yourself right now achieving exactly what you want. Flood the scene with full emotion. Then release it completely." },
          { id:"float",   name:"Free Float", duration:6*60, color:"#a78bfa", icon:"∿", label:"Surrender to the field", instruction:"Release all control. Drift inside the 4Hz. Let the synchronization do its work." },
        ];

        const BREATH_CYCLE = 16;
        const BREATH_PHASES = [
          { name:"Inhale",  start:0,  end:4,  color:ACCENT,   targetScale:1.55 },
          { name:"Hold",    start:4,  end:8,  color:"#fbbf24", targetScale:1.55 },
          { name:"Exhale",  start:8,  end:14, color:ACCENT2,   targetScale:1.0  },
          { name:"Hold",    start:14, end:16, color:"#475569", targetScale:1.0  },
        ];
        const BREATH_DURATION = 2 * 60; 

        function getBreathPhase(sec) {
          const t = sec % BREATH_CYCLE;
          const phase = BREATH_PHASES.find(p => t >= p.start && t < p.end) || BREATH_PHASES[0];
          const localT = (t - phase.start) / (phase.end - phase.start);
          const prev = BREATH_PHASES[(BREATH_PHASES.indexOf(phase) - 1 + 4) % 4];
          const scale = prev.targetScale + (phase.targetScale - prev.targetScale) * (localT < 0.5 ? 2*localT*localT : -1+(4-2*localT)*localT);
          return { phase, scale };
        }

        function getStageIndex(e) {
          let acc = 0;
          for (let i = 0; i < STAGES.length; i++) { acc += STAGES[i].duration; if (e < acc) return i; }
          return STAGES.length - 1;
        }

        function getStageElapsed(e) {
          let acc = 0;
          for (let i = 0; i < STAGES.length; i++) {
            if (e < acc + STAGES[i].duration) return e - acc;
            acc += STAGES[i].duration;
          }
          return STAGES[STAGES.length-1].duration;
        }

        const fmt = (s) => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(Math.floor(s%60)).padStart(2,"0")}`;
        const toRGBA = (hex, a) => { const h=hex.replace("#",""); return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`; };

        function GlassButton({children, onClick, color=ACCENT, variant="ghost", size="md", style={}}) {
          const [hover, setHover] = useState(false);
          return (
            <button 
              onMouseEnter={() => setHover(true)} 
              onMouseLeave={() => setHover(false)}
              onClick={onClick}
              className="liquid-rim"
              style={{
                padding: size === "lg" ? "12px 32px" : "8px 16px",
                background: variant === "primary" ? toRGBA(color, hover ? 0.25 : 0.15) : (hover ? "rgba(255,255,255,0.08)" : "rgba(255,255,255,0.03)"),
                border: `1px solid ${variant === "primary" ? toRGBA(color, 0.5) : "rgba(255,255,255,0.1)"}`,
                color: variant === "primary" ? color : "#e2e8f0",
                borderRadius: "999px", cursor: "pointer", display: "inline-flex", alignItems: "center", justifyContent: "center", gap: "8px", fontWeight: "600", transition: "all 0.2s",
                ...style
              }}
            >
              {children}
            </button>
          );
        }

        function GatewayApp() {
          const [phase, setPhase] = useState("idle");
          const [elapsed, setElapsed] = useState(0);
          const [breathSec, setBreathSec] = useState(0);
          const [volume, setVolume] = useState(0.2);
          const [muted, setMuted] = useState(false);
          const [quality, setQuality] = useState(0);
          const [note, setNote] = useState("");

          const audioRef = useRef(null);
          const timerRef = useRef(null);
          const breathRef = useRef(null);
          const startRef = useRef(null);

          const createAudio = useCallback((vol) => {
            try {
              const ctx = new(window.AudioContext || window.webkitAudioContext)();
              const gain = ctx.createGain(); gain.gain.value = vol;
              const oscL = ctx.createOscillator(), oscR = ctx.createOscillator();
              oscL.type = "sine"; oscL.frequency.value = 170;
              oscR.type = "sine"; oscR.frequency.value = 174;
              const pL = ctx.createStereoPanner(), pR = ctx.createStereoPanner();
              pL.pan.value = -1; pR.pan.value = 1;
              oscL.connect(pL); pL.connect(gain); oscR.connect(pR); pR.connect(gain); gain.connect(ctx.destination);
              oscL.start(); oscR.start();
              audioRef.current = { ctx, gain, oscL, oscR, stop: () => { try { oscL.stop(); oscR.stop(); ctx.close(); } catch(e){} } };
            } catch(e) { console.error(e); }
          }, []);

          const startBreathwork = useCallback(() => {
            setPhase("breath");
            breathRef.current = setInterval(() => {
              setBreathSec(s => {
                if (s >= BREATH_DURATION - 1) { clearInterval(breathRef.current); launchSession(); return 0; }
                return s + 1;
              });
            }, 1000);
          }, [createAudio]);

          const launchSession = useCallback(() => {
            createAudio(muted ? 0 : volume);
            setPhase("active");
            startRef.current = Date.now();
            timerRef.current = setInterval(() => {
              setElapsed(e => {
                if (e >= TOTAL - 1) { clearInterval(timerRef.current); audioRef.current?.stop(); setPhase("done"); return TOTAL; }
                return e + 1;
              });
            }, 1000);
          }, [volume, muted, createAudio]);

          const pauseSession = () => { clearInterval(timerRef.current); setPhase("paused"); if (audioRef.current) audioRef.current.gain.gain.value = 0; };
          const resumeSession = () => { setPhase("active"); timerRef.current = setInterval(() => { setElapsed(e => { if(e>=TOTAL-1){clearInterval(timerRef.current); setPhase("done"); return TOTAL;} return e+1; }); }, 1000); if (audioRef.current) audioRef.current.gain.gain.value = muted ? 0 : volume; };
          const resetSession = () => { clearInterval(timerRef.current); clearInterval(breathRef.current); audioRef.current?.stop(); setPhase("idle"); setElapsed(0); setBreathSec(0); };

          const currentStage = STAGES[getStageIndex(elapsed)];
          const timeLeft = TOTAL - elapsed;
          const { phase: bp, scale: breathScale } = getBreathPhase(breathSec);

          return (
            <div style={{ maxWidth: "480px", width: "100%", margin: "0 auto", padding: "40px 20px", textAlign: "center", color: "#f1f5f9" }}>
              <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet" />
              
              {/* IDLE PHASE */}
              {phase === "idle" && (
                <div className="flex flex-col items-center animation-fade">
                  <div className="w-16 h-16 rounded-2xl flex items-center justify-center mb-4" style={{ background: GRAD }}>
                    <window.IconRenderer name="Brain" size={32} color="#fff" />
                  </div>
                  <h1 className="text-4xl font-extrabold tracking-tight mb-1" style={{ background: GRAD, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>GATEWAY</h1>
                  <p className="text-xs text-slate-500 font-semibold tracking-widest uppercase mb-8">Hemispheric Synchronization</p>

                  <div className="w-100 flex flex-col gap-2 mb-8 text-right" dir="ltr">
                    {STAGES.map(s => (
                      <div key={s.id} className="flex items-center justify-between p-3 rounded-xl border border-slate-800 bg-slate-900/40">
                        <span className="text-xs text-slate-500">{s.duration/60} min</span>
                        <div className="flex items-center gap-3">
                          <div className="text-right">
                            <p className="text-sm font-bold">{s.name}</p>
                            <p className="text-xs text-slate-500">{s.label}</p>
                          </div>
                          <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: toRGBA(s.color, 0.15), color: s.color }}>{s.icon}</div>
                        </div>
                      </div>
                    ))}
                  </div>

                  <div className="w-full p-4 rounded-xl border border-slate-800 bg-slate-900/30 mb-8">
                    <p className="text-xs text-slate-400 mb-2 font-semibold">עוצמת שמע מומלצת: 20%</p>
                    <input type="range" min="5" max="50" value={volume*100} onChange={e => setVolume(Number(e.target.value)/100)} className="w-full accent-cyan-400" />
                  </div>

                  <GlassButton variant="primary" size="lg" onClick={startBreathwork}>
                    <window.IconRenderer name="Wind" size={18} /> להתחיל תרגיל נשימה וסנכרון
                  </GlassButton>
                  <button onClick={launchSession} className="text-xs text-slate-500 mt-4 underline cursor-pointer">דלג ישירות לסנכרון (בלי נשימות)</button>
                </div>
              )}

              {/* BREATHWORK PHASE */}
              {phase === "breath" && (
                <div className="flex flex-col items-center">
                  <h2 className="text-2xl font-bold mb-1">Box Breathing</h2>
                  <p className="text-xs text-slate-500 mb-12">סנכרון דופק והורדת קורטיזול לקראת Focus 10</p>

                  <div className="w-48 h-48 rounded-full flex items-center justify-center mb-8 border transition-all duration-500" style={{ transform: `scale(${breathScale})`, borderColor: bp.color, boxShadow: `0 0 20px ${toRGBA(bp.color, 0.3)}` }}>
                    <span className="text-lg font-bold" style={{ color: bp.color }}>{bp.name}</span>
                  </div>

                  <p className="text-3xl font-extrabold mb-8">{fmt(BREATH_DURATION - breathSec)}</p>
                  <GlassButton onClick={launchSession}>דלג לסנכרון האודיו</GlassButton>
                </div>
              )}

              {/* ACTIVE / PAUSED PHASE */}
              {(phase === "active" || phase === "paused") && (
                <div className="flex flex-col items-center">
                  <div className="w-full flex justify-between items-center mb-12">
                    <GlassButton size="sm" onClick={() => setMuted(!muted)}>
                      <window.IconRenderer name={muted ? "VolumeX" : "Volume2"} size={16} />
                    </GlassButton>
                    <span className="text-xs font-semibold tracking-wider" style={{ color: currentStage.color }}>{phase === "active" ? "סנכרון פעיל (4Hz)" : "מושהה"}</span>
                    <GlassButton size="sm" variant="primary" color="#f87171" onClick={resetSession}>איפוס</GlassButton>
                  </div>

                  <div className="w-56 h-56 rounded-full flex flex-col items-center justify-center mb-8 border" style={{ borderColor: toRGBA(currentStage.color, 0.4), background: "rgba(255,255,255,0.02)" }}>
                    <span className="text-4xl font-extrabold mb-1">{fmt(timeLeft)}</span>
                    <span className="text-xs font-bold uppercase tracking-widest" style={{ color: currentStage.color }}>{currentStage.name}</span>
                  </div>

                  <div className="mb-8">
                    <GlassButton variant="primary" size="lg" onClick={phase === "active" ? pauseSession : resumeSession}>
                      <window.IconRenderer name={phase === "active" ? "Pause" : "Play"} size={18} /> {phase === "active" ? "השהה" : "המשך תרגול"}
                    </GlassButton>
                  </div>

                  <div className="p-4 rounded-xl border border-slate-800 bg-slate-900/60 max-w-sm mb-4">
                    <p className="text-sm text-slate-300 leading-relaxed">{currentStage.instruction}</p>
                  </div>
                </div>
              )}

              {/* DONE PHASE */}
              {phase === "done" && (
                <div className="flex flex-col items-center">
                  <div className="w-16 h-16 rounded-2xl flex items-center justify-center mb-4 bg-emerald-500/20 border border-emerald-500/40 text-emerald-400">
                    <window.IconRenderer name="Sparkles" size={28} color="#34d399" />
                  </div>
                  <h2 className="text-3xl font-bold mb-2">הסנכרון הושלם!</h2>
                  <p className="text-sm text-slate-400 mb-8">המוח שלך מסונכרן כעת (Hemispheric Synchronization).<br/>בהירות קוגניטיבית בשיא.</p>
                  <GlassButton variant="primary" onClick={resetSession}>חזרה לדף הבית</GlassButton>
                </div>
              )}
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(GatewayApp));
    </script>
</body>
</html>
